<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Contact Message</title>
  </head>

  <body
    style="
      margin: 0;
      padding: 0;
      background-color: #0a0a0a;
      font-family:
        -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, Roboto,
        &quot;Helvetica Neue&quot;, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 40px 16px;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" role="presentation">
      <tr>
        <td align="center">
          <table
            width="700"
            cellpadding="0"
            cellspacing="0"
            role="presentation"
            style="max-width: 700px; width: 100%"
          >
            <tr>
              <td
                style="
                  background-color: #121212;
                  border-radius: 18px;
                  overflow: hidden;
                  border: 1px solid rgba(255, 255, 255, 0.06);
                  box-shadow: 0 18px 30px rgba(0, 0, 0, 0.45);
                "
              >
                <!-- Header -->
                <div
                  style="
                    background: linear-gradient(
                      135deg,
                      #0ea5e9 0%,
                      #06b6d4 50%,
                      #8b5cf6 100%
                    );
                    padding: 32px 24px;
                    text-align: center;
                  "
                >
                  <h1
                    style="
                      margin: 0;
                      color: #ffffff;
                      font-size: 26px;
                      font-weight: 800;
                    "
                  >
                    New Contact Message
                  </h1>
                  <p
                    style="
                      margin: 8px 0 0;
                      color: rgba(255, 255, 255, 0.95);
                      font-size: 13px;
                    "
                  >
                    Portfolio contact form notification
                  </p>
                </div>

                <!-- Content -->
                <div style="padding: 26px">
                  <!-- Sender -->
                  <div
                    style="
                      background: linear-gradient(
                        135deg,
                        rgba(14, 165, 233, 0.06),
                        rgba(139, 92, 246, 0.06)
                      );
                      border-radius: 12px;
                      padding: 18px;
                      border: 1px solid rgba(59, 130, 246, 0.12);
                      margin-bottom: 18px;
                    "
                  >
                    <p
                      style="
                        margin: 0 0 10px;
                        color: #60a5fa;
                        font-size: 12px;
                        font-weight: 700;
                        text-transform: uppercase;
                      "
                    >
                      Sender Details
                    </p>

                    <p
                      style="
                        margin: 0;
                        color: #ffffff;
                        font-size: 16px;
                        font-weight: 700;
                      "
                    >
                      {{name}}
                    </p>

                    <a
                      href="mailto:{{email}}"
                      style="
                        display: inline-block;
                        margin-top: 6px;
                        color: #60a5fa;
                        text-decoration: none;
                        font-size: 14px;
                      "
                    >
                      {{email}}
                    </a>

                    <p
                      style="
                        margin: 14px 0 4px;
                        color: #60a5fa;
                        font-size: 11px;
                        font-weight: 700;
                        text-transform: uppercase;
                      "
                    >
                      Subject
                    </p>

                    <p style="margin: 0; color: #ffffff; font-size: 15px">
                      {{subject}}
                    </p>
                  </div>

                  <!-- Message -->
                  <div
                    style="
                      background-color: rgba(0, 0, 0, 0.35);
                      border-radius: 12px;
                      padding: 18px;
                      border: 1px solid rgba(59, 130, 246, 0.1);
                      margin-bottom: 20px;
                    "
                  >
                    <p
                      style="
                        margin: 0 0 10px;
                        color: #ffffff;
                        font-size: 13px;
                        font-weight: 700;
                      "
                    >
                      Message
                    </p>

                    <div
                      style="
                        color: #d1d5db;
                        font-size: 14px;
                        line-height: 1.7;
                        white-space: pre-wrap;
                      "
                    >
                      {{message}}
                    </div>
                  </div>

                  <!-- CTA Button -->
                  <table width="100%" role="presentation">
                    <tr>
                      <td align="center">
                        <a
                          href="mailto:{{email}}?subject=Re:%20{{subject}}"
                          style="
                            display: inline-block;
                            background: linear-gradient(
                              135deg,
                              #0ea5e9,
                              #06b6d4
                            );
                            color: #ffffff;
                            text-decoration: none;
                            padding: 14px 22px;
                            border-radius: 10px;
                            font-weight: 700;
                            font-size: 14px;
                          "
                        >
                          Reply to {{name}}
                        </a>
                      </td>
                    </tr>
                  </table>

                  <!-- Metadata -->
                  <p
                    style="
                      margin: 18px 0 0;
                      text-align: center;
                      color: #9ca3af;
                      font-size: 13px;
                    "
                  >
                    Message received on {{date}}
                  </p>
                </div>

                <!-- Footer -->
                <div
                  style="
                    background: linear-gradient(
                      135deg,
                      #0ea5e9,
                      #06b6d4,
                      #8b5cf6
                    );
                    padding: 16px;
                    text-align: center;
                    border-top: 1px solid rgba(59, 130, 246, 0.15);
                  "
                >
                  <p
                    style="
                      margin: 0;
                      color: rgba(255, 255, 255, 0.95);
                      font-size: 13px;
                    "
                  >
                    Automated notification from your portfolio website
                  </p>
                </div>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
